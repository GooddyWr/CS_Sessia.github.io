<script>
const QA_DATA = [
  // ====== ОСНОВЫ ======
  {n:1, q:"Что такое компьютерная сеть? Какие бывают типы сетей?", tag:"Основы",
   a:`<strong>Компьютерная сеть</strong> — совокупность устройств (хостов), соединённых каналами связи, которые могут обмениваться данными. Типы по охвату:<ul>
   <li><strong>PAN</strong> (Personal Area Network) — личная сеть, ~10 м (Bluetooth)</li>
   <li><strong>LAN</strong> (Local Area Network) — локальная сеть, здание/кампус</li>
   <li><strong>MAN</strong> (Metropolitan Area Network) — городская сеть</li>
   <li><strong>WAN</strong> (Wide Area Network) — глобальная сеть (Интернет)</li></ul>`},
  {n:2, q:"Что такое модель OSI? Перечислите все 7 уровней.", tag:"Основы",
   a:`<strong>OSI</strong> (Open Systems Interconnection) — эталонная модель взаимодействия открытых систем:<ul>
   <li><strong>7. Прикладной (Application)</strong> — интерфейс с пользователем: HTTP, FTP, DNS</li>
   <li><strong>6. Представления (Presentation)</strong> — кодирование, шифрование, сжатие</li>
   <li><strong>5. Сеансовый (Session)</strong> — управление сеансами связи</li>
   <li><strong>4. Транспортный (Transport)</strong> — сегменты, TCP/UDP, порты</li>
   <li><strong>3. Сетевой (Network)</strong> — пакеты, IP, маршрутизация</li>
   <li><strong>2. Канальный (Data Link)</strong> — кадры, MAC, Ethernet</li>
   <li><strong>1. Физический (Physical)</strong> — биты, физическая среда</li></ul>`},
  {n:3, q:"Что такое инкапсуляция и декапсуляция в сетях?", tag:"Основы",
   a:`<strong>Инкапсуляция</strong> — процесс добавления заголовков (и трейлеров) каждым уровнем при передаче данных вниз по стеку протоколов:<ul>
   <li>Прикладной → данные</li>
   <li>Транспортный → сегмент (TCP/UDP заголовок + данные)</li>
   <li>Сетевой → пакет (IP заголовок + сегмент)</li>
   <li>Канальный → кадр (MAC заголовок + пакет + трейлер)</li></ul>
   <strong>Декапсуляция</strong> — обратный процесс на стороне получателя.`},
  {n:4, q:"Что такое протокол? Что он определяет?", tag:"Основы",
   a:`<strong>Протокол</strong> — набор правил, определяющих форматы и порядок сообщений между двумя и более коммуницирующими сущностями. Протокол определяет: <ul>
   <li>Формат сообщений (синтаксис)</li>
   <li>Порядок отправки и получения (семантика)</li>
   <li>Действия при передаче и приёме (прагматика)</li></ul>`},
  {n:5, q:"Что такое задержка в сети? Из чего она складывается?", tag:"Основы",
   a:`Общая задержка пакета складывается из 4 компонентов:<ul>
   <li><strong>d_proc</strong> — задержка обработки: проверка ошибок, определение выходного интерфейса (~мкс)</li>
   <li><strong>d_queue</strong> — задержка ожидания: время в очереди на выходном интерфейсе (переменная)</li>
   <li><strong>d_trans</strong> — задержка передачи: L/R, где L — длина пакета (бит), R — скорость канала (бит/с)</li>
   <li><strong>d_prop</strong> — задержка распространения: d/s, где d — расстояние, s — скорость сигнала</li></ul>`},
  {n:6, q:"Что такое пропускная способность (throughput) и полоса пропускания (bandwidth)?", tag:"Основы",
   a:`<ul>
   <li><strong>Bandwidth (полоса пропускания)</strong> — максимальная скорость передачи данных по каналу, в бит/с. Характеристика канала.</li>
   <li><strong>Throughput (пропускная способность)</strong> — реальная скорость успешной передачи данных между отправителем и получателем. Ограничена узким местом (bottleneck link). Throughput ≤ Bandwidth.</li></ul>`},
  {n:7, q:"Что такое коммутация пакетов и коммутация каналов?", tag:"Основы",
   a:`<ul>
   <li><strong>Коммутация каналов (Circuit Switching)</strong>: перед передачей устанавливается выделенный канал (ресурсы зарезервированы). Гарантированная полоса. Неэффективно при нерегулярном трафике. Пример: телефонная сеть.</li>
   <li><strong>Коммутация пакетов (Packet Switching)</strong>: данные делятся на пакеты, каждый маршрутизируется независимо. Ресурсы не резервируются. Эффективно, но возможны задержки и потери. Пример: Интернет.</li></ul>`},
  {n:8, q:"Что такое Internet? Кто его контролирует?", tag:"Основы",
   a:`<strong>Интернет</strong> — глобальная сеть сетей, объединяющая миллиарды устройств с помощью стека протоколов TCP/IP. Никто единолично не контролирует Интернет. Стандарты разрабатываются: <ul>
   <li><strong>IETF</strong> (Internet Engineering Task Force) — протоколы (RFC)</li>
   <li><strong>ICANN</strong> — доменные имена и IP-адреса</li>
   <li><strong>W3C</strong> — стандарты веба</li></ul>`},
  {n:9, q:"Что такое ISP (провайдер)? Уровни ISP.", tag:"Основы",
   a:`<strong>ISP</strong> (Internet Service Provider) — провайдер интернет-услуг. Иерархия:<ul>
   <li><strong>Tier 1</strong> — глобальные операторы, соединяются напрямую без оплаты (peering): AT&T, Level 3, Telia</li>
   <li><strong>Tier 2</strong> — региональные, платят Tier 1 за транзит</li>
   <li><strong>Tier 3</strong> — локальные, конечные провайдеры для пользователей</li></ul>
   Точки обмена трафиком — <strong>IXP</strong> (Internet Exchange Point).`},
  {n:10, q:"Что такое CDN (Content Delivery Network)?", tag:"Основы",
   a:`<strong>CDN</strong> — распределённая сеть серверов, размещённых по всему миру для ускорения доставки контента. Пользователь получает данные от ближайшего CDN-узла (edge server), а не от центрального сервера. Примеры: Cloudflare, Akamai, AWS CloudFront. Применения: видео (Netflix, YouTube), статические ресурсы сайтов, защита от DDoS.`},

  // ====== ПРИКЛАДНОЙ УРОВЕНЬ ======
  {n:11, q:"Что такое HTTP? Какова его структура запроса и ответа?", tag:"Прикладной",
   a:`<strong>HTTP</strong> (HyperText Transfer Protocol) — протокол передачи гипертекста. Работает поверх TCP (порт 80) или TLS (порт 443 — HTTPS). <br>
   <strong>Запрос:</strong> метод (GET/POST/...) + URL + версия HTTP + заголовки + тело.<br>
   <strong>Ответ:</strong> версия HTTP + код статуса (200 OK, 404 Not Found, 301...) + заголовки + тело.<br>
   HTTP — <strong>stateless</strong> (без состояния): сервер не хранит информацию о прошлых запросах. Состояние управляется через cookies.`},
  {n:12, q:"Чем отличается постоянное HTTP-соединение от непостоянного?", tag:"Прикладной",
   a:`<ul>
   <li><strong>Непостоянное (HTTP/1.0)</strong>: каждый объект требует нового TCP-соединения: 2×RTT + d_trans на объект. Много накладных расходов.</li>
   <li><strong>Постоянное (HTTP/1.1+)</strong>: несколько объектов передаются по одному TCP-соединению. С pipeline — несколько запросов не дожидаясь ответов. Экономия: RTT на каждый объект.</li></ul>`},
  {n:13, q:"Что такое cookie и зачем они нужны?", tag:"Прикладной",
   a:`<strong>Cookie</strong> — небольшой файл (до 4 KB), хранящийся на стороне клиента, для поддержания состояния между HTTP-запросами. Компоненты: заголовок <code>Set-Cookie</code> в ответе сервера, заголовок <code>Cookie</code> в запросах клиента, файл cookie на клиенте, база данных на сервере. Применения: аутентификация, корзина покупок, персонализация.`},
  {n:14, q:"Что такое веб-кэш (proxy server) и как он работает?", tag:"Прикладной",
   a:`<strong>Веб-кэш (прокси)</strong> — промежуточный сервер, хранящий копии ресурсов. Запрос клиента приходит на прокси: если объект есть в кэше — возвращается без обращения к серверу (<strong>cache hit</strong>); иначе — прокси запрашивает оригинал и кэширует. Преимущества: снижение нагрузки на сервер, ускорение для клиентов, экономия трафика.`},
  {n:15, q:"Что такое DNS? Как работает разрешение имён?", tag:"Прикладной",
   a:`<strong>DNS</strong> (Domain Name System) — распределённая иерархическая база данных для перевода доменных имён в IP-адреса. Иерархия: корневые серверы (13 групп) → TLD-серверы (.com, .ru, .org) → авторитетные серверы (для конкретного домена). Локальный DNS-сервер провайдера кэширует ответы (TTL). Процесс разрешения: итеративный или рекурсивный.`},
  {n:16, q:"Какие типы DNS-записей существуют?", tag:"Прикладной",
   a:`Основные типы ресурсных записей DNS (RR):<ul>
   <li><strong>A</strong> — доменное имя → IPv4-адрес</li>
   <li><strong>AAAA</strong> — доменное имя → IPv6-адрес</li>
   <li><strong>CNAME</strong> — псевдоним → каноническое имя</li>
   <li><strong>MX</strong> — почтовый сервер домена</li>
   <li><strong>NS</strong> — авторитетный DNS-сервер зоны</li>
   <li><strong>TXT</strong> — произвольный текст (SPF, DKIM)</li>
   <li><strong>PTR</strong> — IP → доменное имя (обратный DNS)</li></ul>`},
  {n:17, q:"Что такое протокол FTP?", tag:"Прикладной",
   a:`<strong>FTP</strong> (File Transfer Protocol) — протокол передачи файлов. Использует <strong>два</strong> TCP-соединения:<ul>
   <li><strong>Управляющее (порт 21)</strong> — команды и ответы (всегда открыто)</li>
   <li><strong>Данных (порт 20)</strong> — передача файлов (открывается на время передачи)</li></ul>
   FTP — <strong>stateful</strong>: сервер хранит состояние (текущая директория, аутентификация). Режимы: активный (сервер подключается к клиенту) и пассивный (клиент подключается к серверу; лучше работает с NAT/Firewall).`},
  {n:18, q:"Что такое SMTP? Как работает отправка электронной почты?", tag:"Прикладной",
   a:`<strong>SMTP</strong> (Simple Mail Transfer Protocol) — протокол отправки почты (порт 25/587). Протокол «push» (проталкивание). Этапы: Клиент → SMTP-сервер отправителя → SMTP-сервер получателя → почтовый ящик. Получение почты: <strong>POP3</strong> (скачать и удалить) или <strong>IMAP</strong> (хранить на сервере, синхронизация). SMTP работает в ASCII, для бинарных файлов — кодировка Base64/MIME.`},
  {n:19, q:"Что такое протокол POP3 и IMAP?", tag:"Прикладной",
   a:`Протоколы <strong>получения</strong> почты:<ul>
   <li><strong>POP3 (порт 110/995)</strong>: скачивает письма и обычно удаляет с сервера. Без синхронизации между устройствами. Просто, но неудобно с несколькими устройствами.</li>
   <li><strong>IMAP (порт 143/993)</strong>: письма хранятся на сервере. Синхронизация между устройствами. Папки, флаги. Современный стандарт (Gmail, Outlook).</li></ul>`},
  {n:20, q:"Что такое P2P-архитектура? Чем она отличается от клиент-серверной?", tag:"Прикладной",
   a:`<ul>
   <li><strong>Клиент-сервер</strong>: сервер всегда доступен, имеет постоянный IP. Клиенты не общаются напрямую. Нагрузка на сервер растёт линейно с числом клиентов.</li>
   <li><strong>P2P</strong> (peer-to-peer): нет всегда доступного сервера. Узлы общаются напрямую. Самомасштабируемость: каждый новый пир добавляет ресурсы. Пример: BitTorrent, Skype (частично).</li></ul>
   Время распределения файла: P2P растёт значительно медленнее с ростом числа пользователей.`},

  // ====== ТРАНСПОРТНЫЙ УРОВЕНЬ ======
  {n:21, q:"Что такое мультиплексирование и демультиплексирование в транспортном уровне?", tag:"Транспортный",
   a:`<strong>Мультиплексирование</strong> (на отправителе): сбор данных от нескольких сокетов, упаковка с заголовками транспортного уровня в сегменты.<br>
   <strong>Демультиплексирование</strong> (на получателе): доставка данных из сегментов нужному сокету по номеру порта.<br>
   Порты: 0–1023 (well-known), 1024–49151 (registered), 49152–65535 (динамические). Сокет идентифицируется: (IP, порт) для UDP; (IP src, port src, IP dst, port dst) для TCP.`},
  {n:22, q:"Что такое UDP? Структура заголовка. Когда его используют?", tag:"Транспортный",
   a:`<strong>UDP</strong> (User Datagram Protocol) — простой транспортный протокол без установления соединения. Заголовок (8 байт): порт источника (2Б) + порт назначения (2Б) + длина (2Б) + контрольная сумма (2Б). Свойства: нет гарантии доставки, нет порядка, нет контроля перегрузки. Применяется для: DNS, SNMP, VoIP, видеоконференций, DHCP, игр. Приложение само управляет надёжностью если нужно.`},
  {n:23, q:"Что такое TCP? Какие гарантии он предоставляет?", tag:"Транспортный",
   a:`<strong>TCP</strong> (Transmission Control Protocol) — надёжный транспортный протокол с установлением соединения. Гарантии:<ul>
   <li><strong>Надёжная доставка</strong> — подтверждения (ACK), повторная передача при потере</li>
   <li><strong>Порядок доставки</strong> — порядковые номера байт</li>
   <li><strong>Управление потоком</strong> — защита буфера получателя (rwnd)</li>
   <li><strong>Управление перегрузкой</strong> — замедление при перегрузке сети</li>
   <li><strong>Full-duplex</strong> — передача в обоих направлениях одновременно</li></ul>`},
  {n:24, q:"Опишите структуру TCP-заголовка.", tag:"Транспортный",
   a:`TCP-заголовок (минимум 20 байт):<ul>
   <li>Порт источника / назначения (по 2 Б)</li>
   <li>Порядковый номер (Sequence Number, 4 Б)</li>
   <li>Номер подтверждения (Acknowledgement Number, 4 Б)</li>
   <li>Длина заголовка + флаги: URG, ACK, PSH, RST, <strong>SYN</strong>, <strong>FIN</strong> (2 Б)</li>
   <li>Окно приёма (receive window, rwnd, 2 Б)</li>
   <li>Контрольная сумма (2 Б)</li>
   <li>Указатель срочных данных (2 Б)</li>
   <li>Опции (переменная)</li></ul>`},
  {n:25, q:"Что такое трёхстороннее рукопожатие TCP (3-way handshake)?", tag:"Транспортный",
   a:`Установление TCP-соединения выполняется за 3 шага:<ul>
   <li><strong>SYN:</strong> клиент отправляет сегмент с флагом SYN и случайным ISN клиента (seq=x)</li>
   <li><strong>SYN-ACK:</strong> сервер отвечает SYN+ACK, подтверждает (ack=x+1) и сообщает свой ISN (seq=y)</li>
   <li><strong>ACK:</strong> клиент подтверждает ISN сервера. Соединение установлено.</li></ul>
   Для закрытия используется <strong>4-этапное расставание</strong>: FIN → ACK → FIN → ACK.`},
  {n:26, q:"Что такое управление потоком в TCP?", tag:"Транспортный",
   a:`<strong>Управление потоком</strong> (flow control) защищает буфер получателя от переполнения. Получатель сообщает отправителю размер свободного пространства в буфере через поле <strong>rwnd</strong> (receive window) в заголовке TCP. Отправитель не превышает это значение. Размер окна приёма (rwnd) динамически обновляется. Если rwnd=0, отправитель периодически отправляет зондирующие сегменты.`},
  {n:27, q:"Что такое управление перегрузкой в TCP? Опишите алгоритм.", tag:"Транспортный",
   a:`TCP управляет перегрузкой через <strong>окно перегрузки</strong> (cwnd):<ul>
   <li><strong>Slow Start:</strong> cwnd начинается с 1 MSS, удваивается каждый RTT до порога ssthresh</li>
   <li><strong>Congestion Avoidance:</strong> cwnd растёт линейно (на 1 MSS/RTT)</li>
   <li><strong>Fast Retransmit:</strong> при 3 дублирующих ACK — повторная передача без таймаута</li>
   <li><strong>Fast Recovery:</strong> cwnd не сбрасывается до 1, а делится пополам</li></ul>
   При таймауте: ssthresh = cwnd/2, cwnd = 1, Slow Start.`},
  {n:28, q:"Что такое протокол надёжной передачи данных (rdt)? Основные механизмы?", tag:"Транспортный",
   a:`Для надёжной передачи по ненадёжному каналу используются:<ul>
   <li><strong>Подтверждения (ACK/NAK)</strong> — получатель сигнализирует об успешном/неудачном получении</li>
   <li><strong>Таймеры и повторная передача</strong> — при отсутствии ACK</li>
   <li><strong>Порядковые номера</strong> — для определения дублей и порядка</li>
   <li><strong>Конвейеризация</strong> (pipelining) — несколько пакетов «в пути» одновременно: GBN (Go-Back-N) и SR (Selective Repeat)</li></ul>`},
  {n:29, q:"Что такое протокол GBN (Go-Back-N) и SR (Selective Repeat)?", tag:"Транспортный",
   a:`<ul>
   <li><strong>GBN:</strong> отправитель может иметь до N неподтверждённых пакетов. При ошибке — повторяет все пакеты начиная с потерянного. Получатель принимает только по порядку.</li>
   <li><strong>SR (Selective Repeat):</strong> получатель буферизует пакеты вне порядка, подтверждает каждый индивидуально. Повторно передаётся только потерянный пакет. Эффективнее при больших потерях.</li></ul>`},
  {n:30, q:"Для чего используется UDP? Приведите примеры приложений.", tag:"Транспортный",
   a:`UDP применяется, когда важна <strong>скорость</strong>, а не надёжность:<ul>
   <li><strong>DNS</strong> — короткие запросы/ответы</li>
   <li><strong>SNMP</strong> — управление сетью</li>
   <li><strong>VoIP, видеоконференции</strong> — задержка важнее потерь</li>
   <li><strong>Потоковое видео</strong> — допустимы редкие потери</li>
   <li><strong>DHCP</strong> — получение IP-адреса</li></ul>
   UDP обеспечивает <strong>наименьший возможный транспортный сервис</strong>: доставку без гарантий, но с контрольной суммой.`},

  // ====== СЕТЕВОЙ УРОВЕНЬ ======
  {n:31, q:"Какие основные функции выполняет сетевой уровень?", tag:"Сетевой",
   a:`Сетевой уровень выполняет две ключевые функции:<ul>
   <li><strong>Перенаправление (forwarding)</strong> — локальная операция: перемещение пакета со входного интерфейса маршрутизатора на нужный выходной (по таблице маршрутизации)</li>
   <li><strong>Маршрутизация (routing)</strong> — глобальная операция: определение маршрута пакета от источника к приёмнику через сеть, заполнение таблиц маршрутизации</li></ul>`},
  {n:32, q:"Что такое IP-адрес? Чем IPv4 отличается от IPv6?", tag:"Сетевой",
   a:`<strong>IP-адрес</strong> — 32-битный (IPv4) или 128-битный (IPv6) идентификатор сетевого интерфейса.<ul>
   <li><strong>IPv4:</strong> 32 бит, ~4,3 млрд адресов, формат a.b.c.d, проблема исчерпания</li>
   <li><strong>IPv6:</strong> 128 бит, ~3,4×10³⁸ адресов, нет NAT, встроенная безопасность (IPSec), упрощённый заголовок, нет фрагментации в пути</li></ul>`},
  {n:33, q:"Что такое маска подсети и бесклассовая адресация (CIDR)?", tag:"Сетевой",
   a:`<strong>CIDR</strong> (Classless Inter-Domain Routing) — метод адресации без разделения на классы A/B/C. Адрес записывается как <code>a.b.c.d/x</code>, где x — количество битов подсети (префикс).<br>
   Пример: <code>192.168.1.0/24</code> означает 24 бита — адрес сети, 8 бит — адреса хостов (254 хоста). Маска: <code>255.255.255.0</code>.`},
  {n:34, q:"Что такое NAT? Для чего он нужен?", tag:"Сетевой",
   a:`<strong>NAT</strong> (Network Address Translation) — преобразование частных IP-адресов в один публичный. Маршрутизатор с NAT хранит таблицу трансляций (частный IP:порт ↔ публичный IP:порт). Решает проблему нехватки IPv4-адресов. Частные диапазоны: <code>10.x.x.x</code>, <code>172.16-31.x.x</code>, <code>192.168.x.x</code>. Минусы: нарушает сквозной принцип Интернета, проблемы с P2P.`},
  {n:35, q:"Как работает протокол DHCP?", tag:"Сетевой",
   a:`<strong>DHCP</strong> (Dynamic Host Configuration Protocol) — автоматическая выдача IP-адресов. Работает по UDP (порт 67/68). Процесс (DORA):<ol>
   <li><strong>Discover</strong> — клиент широковещательно ищет DHCP-сервер</li>
   <li><strong>Offer</strong> — сервер предлагает IP-адрес</li>
   <li><strong>Request</strong> — клиент запрашивает предложенный адрес</li>
   <li><strong>Acknowledge</strong> — сервер подтверждает и выдаёт адрес, маску, шлюз, DNS</li></ol>`},
  {n:36, q:"Что такое ICMP и зачем он нужен?", tag:"Сетевой",
   a:`<strong>ICMP</strong> (Internet Control Message Protocol) — протокол сообщений об ошибках и диагностики. Работает поверх IP. Сообщения: <ul>
   <li><strong>Echo Request/Reply</strong> — используется командой <code>ping</code></li>
   <li><strong>Destination Unreachable</strong> — хост/сеть/порт недостижимы</li>
   <li><strong>Time Exceeded</strong> — TTL истёк, используется <code>traceroute</code></li></ul>`},
  {n:37, q:"Что такое протокол маршрутизации OSPF?", tag:"Сетевой",
   a:`<strong>OSPF</strong> (Open Shortest Path First) — протокол маршрутизации внутри автономной системы (IGP). Использует алгоритм <strong>Дейкстры</strong> (Link-State). Маршрутизаторы рассылают LSA (Link-State Advertisements) всем соседям — каждый строит полную карту топологии. Поддерживает: иерархическую маршрутизацию, аутентификацию, балансировку нагрузки.`},
  {n:38, q:"Что такое протокол BGP?", tag:"Сетевой",
   a:`<strong>BGP</strong> (Border Gateway Protocol) — протокол маршрутизации между автономными системами (EGP), «клей Интернета». Использует <strong>Path Vector</strong> алгоритм. Каждый маршрут содержит путь AS-PATH. BGP учитывает <strong>политики</strong> (коммерческие соглашения между провайдерами), а не только метрики. iBGP — внутри AS, eBGP — между AS.`},
  {n:39, q:"Что такое алгоритм Дейкстры и алгоритм Беллмана-Форда?", tag:"Сетевой",
   a:`<ul>
   <li><strong>Дейкстра (Link-State):</strong> каждый маршрутизатор знает полную топологию сети, вычисляет кратчайшие пути. Сложность O(N²). Используется в OSPF.</li>
   <li><strong>Беллман-Форд (Distance Vector):</strong> маршрутизатор знает расстояния только до соседей, обменивается векторами расстояний. Медленнее сходится, проблема «счёт до бесконечности». Используется в RIP.</li></ul>`},
  {n:40, q:"Что такое протокол RIP?", tag:"Сетевой",
   a:`<strong>RIP</strong> (Routing Information Protocol) — протокол дистанционно-векторной маршрутизации. Метрика — количество хопов (max 15, 16 = недостижимо). Обновления каждые 30 секунд. Прост в настройке, но медленно сходится, плохо масштабируется. Версии: RIPv1 (классовая), RIPv2 (с маской подсети), RIPng (IPv6).`},

  // ====== КАНАЛЬНЫЙ УРОВЕНЬ ======
  {n:41, q:"Какие функции выполняет канальный уровень?", tag:"Канальный",
   a:`Канальный уровень обеспечивает передачу кадров (frames) между узлами в одном сегменте сети. Функции:<ul>
   <li><strong>Формирование кадров</strong> — инкапсуляция пакетов в кадры</li>
   <li><strong>Обнаружение и исправление ошибок</strong> — CRC, контрольные суммы</li>
   <li><strong>Управление доступом к среде</strong> (MAC) — кто может передавать</li>
   <li><strong>Надёжная доставка</strong> — актуально для беспроводных каналов</li></ul>`},
  {n:42, q:"Что такое протокол CSMA/CD? Где применяется?", tag:"Канальный",
   a:`<strong>CSMA/CD</strong> (Carrier Sense Multiple Access with Collision Detection) — протокол множественного доступа:<ul>
   <li>Узел прослушивает канал перед передачей (<strong>carrier sense</strong>)</li>
   <li>Если канал свободен — начинает передачу</li>
   <li>Если обнаруживает коллизию — прекращает передачу, отправляет jam-сигнал</li>
   <li>Ждёт случайное время (binary exponential backoff) и повторяет</li></ul>
   Применяется в <strong>Ethernet</strong> (проводная). В современных коммутируемых Ethernet-сетях коллизий нет.`},
  {n:43, q:"Что такое MAC-адрес?", tag:"Канальный",
   a:`<strong>MAC-адрес</strong> (Media Access Control) — 48-битный физический адрес сетевого интерфейса, записанный в виде <code>xx:xx:xx:xx:xx:xx</code>. Первые 3 байта — OUI (идентификатор производителя), последние 3 — уникальный номер устройства. Сжигается в ROM сетевой карты. Используется для адресации в канальном уровне. Широковещательный: <code>FF:FF:FF:FF:FF:FF</code>.`},
  {n:44, q:"Как работает протокол ARP?", tag:"Канальный",
   a:`<strong>ARP</strong> (Address Resolution Protocol) — определяет MAC-адрес по известному IP-адресу в пределах подсети.<ol>
   <li>Узел проверяет свою <strong>ARP-таблицу</strong> (кэш IP→MAC)</li>
   <li>Если нет — рассылает широковещательный ARP-запрос: «У кого IP X.X.X.X?»</li>
   <li>Узел с этим IP отвечает своим MAC-адресом</li>
   <li>Запись кэшируется на ~20 минут</li></ol>`},
  {n:45, q:"Что такое коммутатор? Чем он отличается от маршрутизатора?", tag:"Канальный",
   a:`<table class="t-table">
   <tr><th></th><th>Коммутатор (Switch)</th><th>Маршрутизатор (Router)</th></tr>
   <tr><td>Уровень OSI</td><td>2 (канальный)</td><td>3 (сетевой)</td></tr>
   <tr><td>Адресация</td><td>MAC-адреса</td><td>IP-адреса</td></tr>
   <tr><td>Домен коллизий</td><td>Разделяет</td><td>Разделяет</td></tr>
   <tr><td>Домен широковещания</td><td>Не разделяет</td><td>Разделяет</td></tr>
   <tr><td>Таблица</td><td>MAC-таблица</td><td>Таблица маршрутизации</td></tr></table>`},
  {n:46, q:"Что такое VLAN?", tag:"Канальный",
   a:`<strong>VLAN</strong> (Virtual LAN) — логическое разделение физической сети на несколько изолированных виртуальных сетей на уровне коммутатора. Устройства в разных VLAN не могут общаться напрямую (нужен маршрутизатор). Используется для: безопасности, уменьшения широковещательного домена, гибкой группировки. VLAN-теги — стандарт IEEE 802.1Q.`},
  {n:47, q:"Что такое протокол Ethernet? Структура кадра.", tag:"Канальный",
   a:`<strong>Ethernet</strong> — доминирующая технология LAN. Структура кадра:<ul>
   <li><strong>Преамбула</strong> (7 байт) — синхронизация</li>
   <li><strong>SFD</strong> (1 байт) — начало кадра</li>
   <li><strong>MAC-адрес назначения</strong> (6 байт)</li>
   <li><strong>MAC-адрес источника</strong> (6 байт)</li>
   <li><strong>Тип/длина</strong> (2 байта) — тип протокола</li>
   <li><strong>Данные</strong> (46–1500 байт)</li>
   <li><strong>CRC</strong> (4 байта) — контрольная сумма</li></ul>`},
  {n:48, q:"Что такое протокол 802.11 (Wi-Fi)? Чем отличается от Ethernet?", tag:"Канальный",
   a:`<strong>Wi-Fi (IEEE 802.11)</strong> — стандарт беспроводных сетей. Версии: 802.11b (2.4 ГГц, 11 Мбит/с), 802.11g (54 Мбит/с), 802.11n (300 Мбит/с), 802.11ac/Wi-Fi 5 (гигабиты). Использует <strong>CSMA/CA</strong> (с предотвращением коллизий) вместо CSMA/CD (обнаружение). Проблемы: скрытый терминал, помехи; защита — WPA2/WPA3.`},
  {n:49, q:"Что такое STP (Spanning Tree Protocol)?", tag:"Канальный",
   a:`<strong>STP</strong> (IEEE 802.1D) — протокол предотвращения петель в коммутируемых сетях. Выбирается <strong>корневой мост</strong> (Root Bridge) с наименьшим Bridge ID. Строится дерево без петель: некоторые порты блокируются. В современных сетях — RSTP (802.1w, быстрее) и MSTP (802.1s, с VLAN).`},
  {n:50, q:"Что такое обнаружение ошибок? CRC, контрольная сумма.", tag:"Канальный",
   a:`Методы обнаружения ошибок:<ul>
   <li><strong>Бит чётности</strong> — простейший, обнаруживает 1-битные ошибки</li>
   <li><strong>Двумерный бит чётности</strong> — обнаруживает и исправляет 1 бит</li>
   <li><strong>Контрольная сумма</strong> — используется в IP, TCP, UDP; быстро, но слабая защита</li>
   <li><strong>CRC</strong> (Cyclic Redundancy Check) — деление на полином; используется в Ethernet; обнаруживает пакетные ошибки до r-битной длины</li></ul>`},

  // ====== БЕЗОПАСНОСТЬ ======
  {n:51, q:"Какие основные угрозы существуют в компьютерных сетях?", tag:"Безопасность",
   a:`Основные угрозы:<ul>
   <li><strong>Подслушивание (Eavesdropping/Sniffing)</strong> — перехват пакетов в сети</li>
   <li><strong>Подделка адреса (IP Spoofing)</strong> — фальсификация IP-адреса отправителя</li>
   <li><strong>Атака «человек посередине» (MITM)</strong></li>
   <li><strong>Отказ в обслуживании (DoS/DDoS)</strong> — перегрузка сервера запросами</li>
   <li><strong>Вредоносное ПО</strong> — вирусы, черви, трояны</li>
   <li><strong>SYN-флуд</strong> — незавершённые TCP-рукопожатия</li></ul>`},
  {n:52, q:"Что такое шифрование? Симметричное vs асимметричное.", tag:"Безопасность",
   a:`<ul>
   <li><strong>Симметричное</strong>: один ключ для шифрования и расшифровки. Быстро. Проблема: безопасная передача ключа. Алгоритмы: AES, DES.</li>
   <li><strong>Асимметричное (с открытым ключом)</strong>: пара ключей — открытый (шифрует) и закрытый (расшифровывает). Медленнее. Решает проблему обмена ключами. Алгоритмы: RSA, Диффи-Хеллман.</li></ul>
   На практике: асимметричное для обмена симметричным ключом, затем симметричное для данных.`},
  {n:53, q:"Что такое SSL/TLS?", tag:"Безопасность",
   a:`<strong>TLS</strong> (Transport Layer Security, бывший SSL) — криптографический протокол, обеспечивающий <strong>конфиденциальность</strong>, <strong>целостность</strong> и <strong>аутентификацию</strong> соединения. Работает между транспортным и прикладным уровнями. <strong>HTTPS = HTTP + TLS</strong>. Процесс: Handshake (обмен сертификатами и ключами) → шифрованная передача данных.`},
  {n:54, q:"Что такое межсетевой экран (Firewall)?", tag:"Безопасность",
   a:`<strong>Firewall</strong> — устройство или ПО, фильтрующее трафик по правилам. Типы:<ul>
   <li><strong>Пакетный фильтр</strong> — анализирует заголовки IP/TCP/UDP (адрес, порт, флаги)</li>
   <li><strong>Stateful firewall</strong> — отслеживает состояние соединений</li>
   <li><strong>Прикладной шлюз (Application Gateway)</strong> — анализирует данные прикладного уровня</li></ul>`},
  {n:55, q:"Что такое VPN?", tag:"Безопасность",
   a:`<strong>VPN</strong> (Virtual Private Network) — технология создания зашифрованного туннеля через публичную сеть (Интернет). Обеспечивает:<ul>
   <li>Конфиденциальность трафика</li>
   <li>Удалённый доступ к корпоративной сети</li>
   <li>Обход гео-блокировок</li></ul>
   Протоколы: IPSec, OpenVPN, WireGuard. IPSec работает на сетевом уровне.`},

  // ====== ДОПОЛНИТЕЛЬНЫЕ ТЕМЫ ======
  {n:56, q:"Что такое модель TCP/IP (5-уровневая)?", tag:"Основы",
   a:`Модель TCP/IP, используемая в Интернете:<ul>
   <li><strong>5. Прикладной</strong> — HTTP, FTP, SMTP, DNS, Telnet</li>
   <li><strong>4. Транспортный</strong> — TCP, UDP</li>
   <li><strong>3. Сетевой</strong> — IP, ICMP, OSPF, BGP</li>
   <li><strong>2. Канальный</strong> — Ethernet, PPP, Wi-Fi</li>
   <li><strong>1. Физический</strong> — биты, физическая среда</li></ul>`},
  {n:57, q:"Что такое HTTP/2 и HTTP/3? Основные улучшения.", tag:"Прикладной",
   a:`<ul>
   <li><strong>HTTP/2:</strong> мультиплексирование (несколько запросов по одному TCP), сжатие заголовков (HPACK), server push, бинарный формат. Устраняет блокировку очереди на уровне HTTP, но не TCP.</li>
   <li><strong>HTTP/3:</strong> работает поверх <strong>QUIC</strong> (UDP), не TCP. Быстрое установление соединения (0-RTT), нет блокировки очереди, встроенный TLS.</li></ul>`},
  {n:58, q:"Что такое протокол QUIC?", tag:"Транспортный",
   a:`<strong>QUIC</strong> (Quick UDP Internet Connections) — транспортный протокол от Google поверх UDP. Обеспечивает: <ul>
   <li>Быстрое установление соединения (0-1 RTT vs 3 RTT у TCP+TLS)</li>
   <li>Мультиплексирование потоков без блокировки</li>
   <li>Встроенное шифрование (TLS 1.3)</li>
   <li>Перенос соединения при смене IP (смена Wi-Fi → мобильный)</li></ul>
   Основа HTTP/3.`},
  {n:59, q:"Что такое IPv6? Почему переход на него важен?", tag:"Сетевой",
   a:`IPv4-адреса исчерпаны (официально — 2011 год). <strong>IPv6</strong> решает эту проблему: 128-битные адреса, формат <code>xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx:xxxx</code>. Преимущества: нет NAT, встроенный IPSec, автоконфигурация (SLAAC), упрощённый заголовок, multicast вместо broadcast. Переход затруднён из-за несовместимости с IPv4; используются туннелирование и двойной стек.`},
  {n:60, q:"Что такое протокол OSPF и чем он лучше RIP?", tag:"Сетевой",
   a:`<strong>OSPF</strong> лучше RIP по нескольким параметрам:<ul>
   <li>Нет ограничения в 15 хопов</li>
   <li>Быстрее сходится (мгновенно после изменения топологии)</li>
   <li>Поддерживает иерархию (зоны: Area 0 + другие зоны)</li>
   <li>Балансировка нагрузки по одинаковым маршрутам</li>
   <li>Поддержка аутентификации</li>
   <li>Метрика — стоимость (cost), а не хопы</li></ul>`},
  {n:61, q:"Что такое CDN и DNS-анкеринг?", tag:"Прикладной",
   a:`CDN использует DNS для направления пользователей на ближайший узел. При запросе к cdn.example.com DNS возвращает IP ближайшего CDN-сервера (по геолокации или latency). Этот механизм называется <strong>anycast DNS</strong>. Некоторые CDN также используют IP anycast (один IP, несколько серверов, BGP выбирает ближайший).`},
  {n:62, q:"Что такое traceroute и как он работает?", tag:"Сетевой",
   a:`<strong>traceroute</strong> — утилита для отслеживания маршрута пакетов. Принцип: отправляет UDP (или ICMP) пакеты с TTL=1,2,3... Когда TTL истекает у очередного маршрутизатора, тот отправляет ICMP «Time Exceeded» — так получаем IP каждого хопа. Показывает: маршрут, RTT до каждого хопа, где возникают задержки.`},
  {n:63, q:"Что такое Wide Area Network (WAN)? Технологии WAN.", tag:"Основы",
   a:`<strong>WAN</strong> — сеть, охватывающая большие географические расстояния. Технологии:<ul>
   <li><strong>Leased Lines</strong> — выделенные линии (T1, E1)</li>
   <li><strong>Frame Relay</strong> — устаревшая технология коммутации пакетов</li>
   <li><strong>ATM</strong> — асинхронный режим передачи, ячейки 53 байта</li>
   <li><strong>MPLS</strong> — коммутация по меткам, быстро и гибко</li>
   <li><strong>SD-WAN</strong> — программно-определяемые WAN</li></ul>`},
  {n:64, q:"Что такое MPLS?", tag:"Сетевой",
   a:`<strong>MPLS</strong> (Multiprotocol Label Switching) — технология передачи данных по меткам, а не IP-адресам. Между IP и канальным уровнем. Метки присваиваются на входе сети (<strong>LER</strong>), коммутируются в ядре (<strong>LSR</strong>) по таблицам меток, снимаются на выходе. Преимущества: быстрая коммутация, поддержка QoS, Traffic Engineering, VPN.`},
  {n:65, q:"Что такое QoS (Quality of Service)?", tag:"Сетевой",
   a:`<strong>QoS</strong> — механизмы управления сетевым трафиком для приоритизации чувствительных к задержкам приложений (VoIP, видео). Методы:<ul>
   <li><strong>Scheduling</strong> — порядок передачи пакетов (FIFO, WFQ, приоритет)</li>
   <li><strong>Policing/Shaping</strong> — ограничение скорости</li>
   <li><strong>Marking</strong> — маркировка пакетов (DSCP в IP-заголовке)</li>
   <li><strong>Admission Control</strong> — допуск трафика</li></ul>`},
  {n:66, q:"Что такое маршрутизация в SDN (Software Defined Networking)?", tag:"Сетевой",
   a:`<strong>SDN</strong> — архитектура, разделяющая плоскость управления (control plane) и плоскость данных (data plane). Централизованный <strong>контроллер</strong> управляет всеми коммутаторами через OpenFlow. Преимущества: гибкость, программируемость, централизованное управление, упрощение оборудования.`},
  {n:67, q:"Что такое протокол ICMP v6 (ICMPv6)?", tag:"Сетевой",
   a:`<strong>ICMPv6</strong> — расширенная версия ICMP для IPv6. Выполняет функции ICMP + ARP + IGMP:<ul>
   <li><strong>Neighbor Discovery Protocol (NDP)</strong> — замена ARP для IPv6</li>
   <li><strong>SLAAC</strong> — автоконфигурация адресов</li>
   <li><strong>MLD</strong> — управление многоадресными группами (как IGMP)</li></ul>`},
  {n:68, q:"Что такое туннелирование в сетях?", tag:"Сетевой",
   a:`<strong>Туннелирование</strong> — инкапсуляция пакетов одного протокола внутрь другого для передачи через несовместимую сеть. Примеры: <ul>
   <li>IPv6-in-IPv4 — для перехода на IPv6</li>
   <li>GRE — универсальный туннель</li>
   <li>IPSec — шифрованный туннель (VPN)</li>
   <li>L2TP — туннель канального уровня</li></ul>`},
  {n:69, q:"Что такое потоковое видео и протокол DASH?", tag:"Прикладной",
   a:`<strong>DASH</strong> (Dynamic Adaptive Streaming over HTTP) — адаптивная потоковая передача видео. Видео кодируется в нескольких качествах/битрейтах. Клиент динамически выбирает качество в зависимости от доступной пропускной способности. Используется в YouTube, Netflix. Позволяет избежать буферизации при нестабильном соединении.`},
  {n:70, q:"Что такое протокол SNMP?", tag:"Прикладной",
   a:`<strong>SNMP</strong> (Simple Network Management Protocol) — протокол управления сетевыми устройствами. Работает по UDP (порт 161/162). Компоненты: <strong>Manager</strong> (система управления), <strong>Agent</strong> (на устройстве), <strong>MIB</strong> (база управляющей информации). Операции: <code>GET</code>, <code>SET</code>, <code>TRAP</code> (уведомления). Версии: SNMPv1, v2c, v3 (с аутентификацией/шифрованием).`},
  {n:71, q:"Что такое DHCP Snooping и Dynamic ARP Inspection?", tag:"Безопасность",
   a:`<ul>
   <li><strong>DHCP Snooping</strong> — функция коммутатора, блокирующая «мошеннические» DHCP-серверы. Только доверенные порты могут отвечать на DHCP-запросы.</li>
   <li><strong>Dynamic ARP Inspection (DAI)</strong> — проверка ARP-пакетов по таблице DHCP Snooping. Предотвращает ARP-спуфинг (подмену MAC-адресов).</li></ul>`},
  {n:72, q:"Что такое порядковые номера (sequence numbers) в TCP?", tag:"Транспортный",
   a:`<strong>Порядковые номера</strong> (sequence numbers) в TCP нумеруют байты потока данных, а не сегменты. Позволяют получателю: <ul>
   <li>Обнаружить потерянные сегменты</li>
   <li>Переупорядочить сегменты, пришедшие не по порядку</li>
   <li>Обнаружить дублирующиеся сегменты</li></ul>
   Начальный порядковый номер (ISN) — случайный, обменивается при рукопожатии.`},
  {n:73, q:"Что такое задержка ожидания (queuing delay) и как она зависит от нагрузки?", tag:"Основы",
   a:`Задержка ожидания растёт нелинейно с интенсивностью трафика. При <strong>интенсивности трафика</strong> (traffic intensity) <code>La/R → 1</code> (L — длина пакета, a — частота поступления, R — скорость канала), задержка ожидания стремится к бесконечности. При La/R > 1 очередь растёт бесконечно — пакеты теряются.`},
  {n:74, q:"Что такое Content Delivery и как Netflix организует доставку видео?", tag:"Прикладной",
   a:`Netflix использует собственную CDN — <strong>Open Connect</strong>. Серверы Open Connect размещаются непосредственно в ЦОД провайдеров (ISP). Клиент получает видео от ближайшего OCA-сервера. Netflix использует DASH для адаптивного качества. Контент предзагружается на OCA в ночное время.`},
  {n:75, q:"Что такое Inter-AS и Intra-AS маршрутизация?", tag:"Сетевой",
   a:`<ul>
   <li><strong>Intra-AS (внутри автономной системы)</strong>: маршрутизация внутри одной организации. Протоколы: OSPF, RIP, EIGRP. Цель — эффективность.</li>
   <li><strong>Inter-AS (между автономными системами)</strong>: маршрутизация между организациями/провайдерами. Протокол: BGP. Цель — политика + достижимость.</li></ul>`},
  {n:76, q:"Что такое Mobile IP?", tag:"Сетевой",
   a:`<strong>Mobile IP</strong> — механизм поддержания постоянного IP-адреса при перемещении устройства между сетями. Компоненты: <strong>Home Agent</strong> (в домашней сети), <strong>Foreign Agent</strong> (в посещаемой сети), <strong>Care-of Address</strong> (временный адрес). Туннелирование пакетов между Home Agent и Foreign Agent.`},
  {n:77, q:"Что такое беспроводная сеть WPAN, WLAN, WMAN, WWAN?", tag:"Канальный",
   a:`Классификация беспроводных сетей по радиусу действия:<ul>
   <li><strong>WPAN</strong> (~10 м) — Bluetooth, ZigBee, NFC</li>
   <li><strong>WLAN</strong> (~100 м) — Wi-Fi (802.11)</li>
   <li><strong>WMAN</strong> (~50 км) — WiMAX (802.16)</li>
   <li><strong>WWAN</strong> (страна/мир) — 3G, 4G LTE, 5G</li></ul>`},
  {n:78, q:"Что такое скрытый терминал в беспроводных сетях?", tag:"Канальный",
   a:`<strong>Проблема скрытого терминала</strong>: узел A и узел C не слышат друг друга, но оба слышат точку доступа B. Когда A и C передают одновременно, происходит коллизия у B, но ни A, ни C её не обнаруживают. Решение: <strong>RTS/CTS</strong> — Request To Send / Clear To Send. A отправляет RTS → B отвечает CTS (слышат все) → C молчит пока A передаёт.`},
  {n:79, q:"Что такое CSMA/CA?", tag:"Канальный",
   a:`<strong>CSMA/CA</strong> (Carrier Sense Multiple Access with Collision Avoidance) — протокол доступа к среде в Wi-Fi. В отличие от CSMA/CD, <em>избегает</em> коллизий (их сложно обнаружить в беспроводной среде). После обнаружения свободного канала ждёт случайное время (backoff), затем передаёт. Использует ACK для подтверждения. Опционально — RTS/CTS.`},
  {n:80, q:"Что такое Spanning Tree и зачем он нужен?", tag:"Канальный",
   a:`Без STP в коммутируемой сети с избыточными линками возникают <strong>петли</strong>: широковещательные кадры циркулируют бесконечно (<strong>broadcast storm</strong>). STP строит логическое дерево без петель, блокируя избыточные порты. При падении линка STP перестраивает дерево (~30–50 сек в классическом STP, ~1–2 сек в RSTP).`},
  {n:81, q:"Что такое IP-фрагментация?", tag:"Сетевой",
   a:`Если пакет IP больше MTU (Maximum Transmission Unit) следующего звена, он <strong>фрагментируется</strong>: разбивается на несколько меньших пакетов. Каждый фрагмент содержит смещение и флаг «есть ещё фрагменты» (MF). Сборка — только на конечном получателе. IPv6 запрещает фрагментацию в пути; отправитель обязан определить MTU пути (Path MTU Discovery).`},
  {n:82, q:"Что такое TTL в IPv4 и Hop Limit в IPv6?", tag:"Сетевой",
   a:`<strong>TTL</strong> (Time to Live) — поле в заголовке IPv4, уменьшаемое каждым маршрутизатором на 1. При достижении 0 — пакет отбрасывается, отправляется ICMP «Time Exceeded». Предотвращает бесконечную циркуляцию пакетов. Обычно начальное значение: 64 или 128. В IPv6 аналогичное поле — <strong>Hop Limit</strong>.`},
  {n:83, q:"Что такое протокол BGP и атрибуты маршрутов?", tag:"Сетевой",
   a:`BGP-маршруты содержат атрибуты:<ul>
   <li><strong>AS-PATH</strong> — список AS, через которые прошёл маршрут (защита от петель)</li>
   <li><strong>NEXT-HOP</strong> — IP-адрес следующего хопа</li>
   <li><strong>LOCAL-PREF</strong> — предпочтение выхода из AS (выше = предпочтительнее)</li>
   <li><strong>MED</strong> (Multi-Exit Discriminator) — подсказка соседней AS о предпочтительном входе</li>
   <li><strong>COMMUNITY</strong> — теги для групповой политики</li></ul>`},
  {n:84, q:"Что такое Digital Signature (цифровая подпись)?", tag:"Безопасность",
   a:`<strong>Цифровая подпись</strong> — криптографический механизм проверки подлинности и целостности сообщения. Процесс:<ol>
   <li>Отправитель вычисляет хэш сообщения</li>
   <li>Шифрует хэш своим <em>закрытым</em> ключом → подпись</li>
   <li>Получатель расшифровывает подпись <em>открытым</em> ключом отправителя</li>
   <li>Сравнивает с хэшем сообщения</li></ol>
   Используется в сертификатах TLS, электронной почте (S/MIME).`},
  {n:85, q:"Что такое сертификат X.509 и PKI?", tag:"Безопасность",
   a:`<strong>X.509</strong> — стандарт цифровых сертификатов. Сертификат содержит: имя владельца, открытый ключ, срок действия, цифровую подпись удостоверяющего центра (CA). <strong>PKI</strong> (Public Key Infrastructure) — система выдачи и управления сертификатами. Используется в HTTPS: браузер проверяет, что сертификат подписан доверенным CA.`},
  {n:86, q:"Что такое DDoS-атака и методы защиты?", tag:"Безопасность",
   a:`<strong>DDoS</strong> (Distributed Denial of Service) — атака с тысяч заражённых машин (ботнет), генерирующих огромный трафик к жертве. Методы: UDP flood, SYN flood, HTTP flood, amplification (DNS/NTP). Защита: <ul>
   <li>Фильтрация на уровне провайдера (BGP blackhole)</li>
   <li>CDN и Anycast (распределение нагрузки)</li>
   <li>Rate limiting</li>
   <li>Специализированные сервисы (Cloudflare, Akamai)</li></ul>`},
  {n:87, q:"Что такое IPSec?", tag:"Безопасность",
   a:`<strong>IPSec</strong> — набор протоколов для шифрования и аутентификации IP-пакетов на сетевом уровне. Режимы: <ul>
   <li><strong>Transport mode</strong> — шифруется только полезная нагрузка IP</li>
   <li><strong>Tunnel mode</strong> — шифруется весь IP-пакет (используется в VPN)</li></ul>
   Протоколы: <strong>AH</strong> (Authentication Header) — только аутентификация; <strong>ESP</strong> (Encapsulating Security Payload) — шифрование + аутентификация.`},
  {n:88, q:"Что такое P2P-сети и распределённые хэш-таблицы (DHT)?", tag:"Прикладной",
   a:`<strong>DHT</strong> (Distributed Hash Table) — децентрализованная структура данных в P2P-сетях для хранения пар (ключ → значение) без центрального сервера. Каждый узел хранит часть данных. Пример: Chord, Kademlia (используется в BitTorrent). Поиск за O(log N) шагов.`},
  {n:89, q:"Что такое оптоволоконный кабель? Одномодовый vs многомодовый.", tag:"Основы",
   a:`<strong>Оптоволокно</strong> — среда передачи данных в виде стеклянных/пластиковых нитей, передающих световые импульсы. Скорость передачи — до сотен Тбит/с, нечувствительно к ЭМП.<ul>
   <li><strong>Одномодовый (SMF)</strong>: один луч, диаметр ~9 мкм, дальность до 100 км+. Для WAN.</li>
   <li><strong>Многомодовый (MMF)</strong>: несколько лучей, диаметр ~50-62 мкм, дальность до 2 км. Для LAN.</li></ul>`},
  {n:90, q:"Что такое витая пара? Категории кабеля.", tag:"Основы",
   a:`<strong>Витая пара</strong> (Twisted Pair) — медный кабель из скрученных пар проводов. Скрутка уменьшает электромагнитные помехи. Типы: <strong>UTP</strong> (неэкранированная), <strong>STP</strong> (экранированная). Категории: Cat5e (1 Гбит/с до 100 м), Cat6 (10 Гбит/с до 55 м), Cat6a (10 Гбит/с до 100 м), Cat8 (40 Гбит/с). Используется в Ethernet.`},
  {n:91, q:"Что такое мультиплексирование с разделением по длине волны (WDM)?", tag:"Основы",
   a:`<strong>WDM</strong> (Wavelength Division Multiplexing) — технология одновременной передачи нескольких сигналов по одному оптоволокну на разных длинах волн (цветах). <strong>DWDM</strong> (Dense WDM) — до 160 каналов в одном волокне. Многократно увеличивает пропускную способность существующей инфраструктуры.`},
  {n:92, q:"Что такое PON (Passive Optical Network) и FTTH?", tag:"Основы",
   a:`<strong>FTTH</strong> (Fiber To The Home) — оптоволокно до квартиры. <strong>PON</strong> — пассивная оптическая сеть без активного оборудования в промежуточных узлах (только пассивные сплиттеры). Один OLT (оптический терминал провайдера) обслуживает до 64 ONT (терминалов у абонентов). GPON — 2,5 Гбит/с вниз, XGS-PON — 10 Гбит/с.`},
  {n:93, q:"Что такое протокол Telnet и SSH? Чем SSH лучше?", tag:"Прикладной",
   a:`<ul>
   <li><strong>Telnet (порт 23)</strong> — удалённое управление устройствами через командную строку. Передаёт данные <em>в открытом виде</em> — небезопасен.</li>
   <li><strong>SSH (Secure Shell, порт 22)</strong> — зашифрованный аналог Telnet. Использует асимметричную криптографию для аутентификации (пароль или ключевая пара), симметричное шифрование для данных. SSH также поддерживает SCP, SFTP, Port Forwarding.</li></ul>`},
  {n:94, q:"Что такое NAT traversal и почему он необходим для P2P?", tag:"Сетевой",
   a:`Устройства за NAT имеют только частные IP и не достижимы снаружи напрямую. <strong>NAT Traversal</strong> — методы установления прямого соединения через NAT:<ul>
   <li><strong>STUN</strong> — узнать свой внешний IP:порт</li>
   <li><strong>TURN</strong> — relay-сервер для трафика</li>
   <li><strong>ICE</strong> — комбинированный подход (WebRTC)</li>
   <li><strong>Hole punching</strong> — одновременный обмен соединениями</li></ul>`},
  {n:95, q:"Что такое DNS-over-HTTPS (DoH) и зачем он нужен?", tag:"Безопасность",
   a:`<strong>DoH</strong> (DNS over HTTPS) и <strong>DoT</strong> (DNS over TLS) — технологии шифрования DNS-запросов. Обычный DNS передаётся в открытом виде (UDP 53) и может быть перехвачен/изменён. DoH передаёт DNS-запросы по зашифрованному HTTPS (порт 443), скрывая их от провайдера и атакующих. Поддерживается в Firefox, Chrome, Windows.`},
  {n:96, q:"Что такое BGP Hijacking?", tag:"Безопасность",
   a:`<strong>BGP Hijacking</strong> — атака, при которой злоумышленник объявляет в BGP чужие IP-префиксы, перехватывая трафик. Возможна из-за отсутствия аутентификации в базовом BGP. Примеры: случайный перехват трафика YouTube в 2008 г. (Pakistan Telecom). Защита: <strong>RPKI</strong> (Resource Public Key Infrastructure) — криптографически подписанные разрешения на объявление префиксов.`},
  {n:97, q:"Что такое multicast? Чем отличается от unicast и broadcast?", tag:"Сетевой",
   a:`<ul>
   <li><strong>Unicast</strong> — передача от одного к одному (1:1)</li>
   <li><strong>Broadcast</strong> — передача всем в сети (1:все)</li>
   <li><strong>Multicast</strong> — передача группе заинтересованных получателей (1:N). Адреса IPv4: 224.0.0.0–239.255.255.255. Протокол управления группами: IGMP (v3). Маршрутизация: PIM. Используется для IPTV, конференций.</li></ul>`},
  {n:98, q:"Что такое IGMP?", tag:"Сетевой",
   a:`<strong>IGMP</strong> (Internet Group Management Protocol) — протокол управления группами multicast между хостами и ближайшим маршрутизатором. Хост отправляет IGMP Join для присоединения к группе, IGMP Leave для выхода. Маршрутизатор периодически запрашивает (Query) активных членов групп. Версии: IGMPv1, v2, v3 (Source Specific Multicast).`},
  {n:99, q:"Что такое MIMO в Wi-Fi?", tag:"Канальный",
   a:`<strong>MIMO</strong> (Multiple Input Multiple Output) — технология использования нескольких антенн для одновременной передачи/приёма нескольких потоков данных. Увеличивает пропускную способность и надёжность. <strong>MU-MIMO</strong> (Multi-User MIMO) — одновременная работа с несколькими клиентами. Используется в 802.11n (2×2 MIMO), 802.11ac (4×4 MU-MIMO), 802.11ax (8×8 OFDMA+MU-MIMO).`},
  {n:100, q:"Что такое OFDM и почему он используется в беспроводных сетях?", tag:"Канальный",
   a:`<strong>OFDM</strong> (Orthogonal Frequency Division Multiplexing) — метод модуляции, разделяющий канал на множество узких подканалов (поднесущих). Каждая поднесущая ортогональна другим, что минимизирует интерференцию. Преимущества: <ul>
   <li>Устойчивость к многолучевому распространению</li>
   <li>Эффективное использование спектра</li>
   <li>Масштабируемая скорость</li></ul>
   Используется в Wi-Fi (802.11a/g/n/ac/ax), 4G LTE, 5G, DSL.`}
];

function renderQA(items) {
  const list = document.getElementById('qa-list');
  const count = document.getElementById('qa-count');
  if (items.length === 0) {
    list.innerHTML = '<div class="no-results">🔍 Ничего не найдено. Попробуйте другой запрос.</div>';
    count.textContent = 'Показано: 0 вопросов';
    return;
  }
  count.textContent = `Показано: ${items.length} вопросов`;
  list.innerHTML = items.map(q => `
    <div class="qa-item" id="qa-${q.n}">
      <div class="qa-question" onclick="toggleQA(${q.n})">
        <span class="qa-num">#${q.n}</span>
        <div style="flex:1">
          <div class="qa-q-text">${q.q}</div>
          <div class="qa-tags"><span class="qa-tag">${q.tag}</span></div>
        </div>
        <span class="qa-arrow">▼</span>
      </div>
      <div class="qa-answer">${q.a}</div>
    </div>
  `).join('');
}

function toggleQA(n) {
  const el = document.getElementById(`qa-${n}`);
  el.classList.toggle('open');
}

let currentFilter = 'all';
let currentSearch = '';

function filterQA(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchQA(val) {
  currentSearch = val.toLowerCase();
  applyFilters();
}

function applyFilters() {
  let items = QA_DATA;
  if (currentFilter !== 'all') {
    items = items.filter(q => q.tag === currentFilter);
  }
  if (currentSearch) {
    items = items.filter(q =>
      q.q.toLowerCase().includes(currentSearch) ||
      q.a.toLowerCase().includes(currentSearch) ||
      q.tag.toLowerCase().includes(currentSearch)
    );
  }
  renderQA(items);
}

renderQA(QA_DATA);
</script>
