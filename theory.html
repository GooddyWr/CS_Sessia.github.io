      <h3>Коэффициент использования канала (pipeline)</h3>

      <p>где N — размер окна (пакетов), L/R — время передачи одного пакета</p>
    </div>
    <div class="t-card">
      <h3>Интенсивность трафика</h3>
      <code class="formula">Traffic Intensity = L×a/R</code>
      <p>где L — длина пакета (бит), a — частота поступления (пак/с), R — скорость канала (бит/с).</p>
      <p>При <strong>La/R ≥ 1</strong> → очередь растёт бесконечно, пакеты теряются.</p>
    </div>
    <div class="t-card">
      <h3>BitTorrent — скорость раздачи (tit-for-tat)</h3>
      <p>Пир выбирает 4 соседей с максимальной скоростью передачи ему данных (<em>unchoked</em>). Каждые 30 сек случайно выбирается новый пир (<em>optimistically unchoked</em>) — шанс для новых участников.</p>
    </div>`
  }
];

function renderTheory() {
  const nav = document.getElementById('theory-nav');
  const sections = document.getElementById('theory-sections');

  nav.innerHTML = THEORY_DATA.map((t, i) => `
    <button class="t-nav-btn ${i===0?'active':''}" onclick="showTheory('${t.id}', this)">${t.title}</button>
  `).join('');

  sections.innerHTML = THEORY_DATA.map((t, i) => `
    <div class="theory-section ${i===0?'active':''}" id="theory-${t.id}">
      <div class="t-title">${t.title}</div>
      ${t.content}
    </div>
  `).join('');
}

function showTheory(id, btn) {
  document.querySelectorAll('.theory-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.t-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('theory-' + id).classList.add('active');
  btn.classList.add('active');
}

renderTheory();
</script>
</body>
</html>
